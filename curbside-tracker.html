<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Curbside">
<meta name="theme-color" content="#F2F0EC">
<title>Curbside Arrivals</title>
<style>
  :root{
    --bg:#F2F0EC; --surface:#FFFFFF; --ink:#1C2230; --muted:#6B7280;
    --line:#E4E1DA; --wait:#E8920C; --wait-soft:#FBEAD0; --ready:#1F9D5B;
    --ready-soft:#DCF1E6; --shadow:0 1px 2px rgba(28,34,48,.06),0 8px 24px rgba(28,34,48,.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.4;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:880px; margin:0 auto; padding:20px 16px 64px}

  header{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin:8px 2px 18px}
  header h1{font-size:22px; font-weight:800; letter-spacing:-.02em; margin:0}
  header h1 span{color:var(--muted); font-weight:600}
  .counts{margin-left:auto; display:flex; gap:8px; font-size:13px; font-weight:700}
  .pill{padding:5px 11px; border-radius:999px; white-space:nowrap}
  .pill.w{background:var(--wait-soft); color:#9A5B00}
  .pill.r{background:var(--ready-soft); color:#0F6E3E}

  form.add{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); padding:14px; display:grid;
    grid-template-columns:1fr 140px; gap:10px; margin-bottom:22px;
  }
  .add .field-notes, .add button{grid-column:1 / -1}
  form.add label{display:block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; color:var(--muted); margin:0 0 5px 2px}
  input{
    width:100%; font-size:17px; padding:12px 13px; border:1px solid var(--line);
    border-radius:11px; background:#FBFAF8; color:var(--ink); font-family:inherit;
  }
  input:focus{outline:2px solid var(--ink); outline-offset:1px; border-color:transparent}
  .add .field-spot input{font-variant-numeric:tabular-nums; font-weight:700}
  button{font-family:inherit; cursor:pointer; border:none}
  .add button{
    background:var(--ink); color:#fff; font-size:16px; font-weight:700;
    padding:13px 20px; border-radius:11px;
  }
  .add button:active{transform:translateY(1px)}

  .list{display:flex; flex-direction:column; gap:10px}
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); padding:12px; display:flex; align-items:center; gap:14px;
  }
  /* Signature element: the spot plate. Tap to flip fulfillment <-> runner. */
  .plate{
    flex:0 0 auto; min-width:78px; height:78px; border-radius:13px; border:2px solid;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; padding:4px 10px; transition:background .12s,border-color .12s;
  }
  .plate .num{font-size:30px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .plate .tag{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; margin-top:5px}
  .card.waiting .plate{background:var(--wait-soft); border-color:var(--wait); color:#8A5200}
  .card.ready   .plate{background:var(--ready-soft); border-color:var(--ready); color:#0F6E3E}
  .plate:focus-visible{outline:2px solid var(--ink); outline-offset:2px}

  .who{flex:1 1 auto; min-width:0}
  .who .name{font-size:19px; font-weight:700; letter-spacing:-.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .who .meta{font-size:13px; color:var(--muted); margin-top:2px}
  .who .meta b{color:var(--wait); font-weight:700}
  .card.ready .who .meta b{color:var(--ready)}
  .who .note{display:inline-block; font-size:13px; color:#7A5A00; margin-top:5px;
    background:#FFF4D6; border:1px solid #F0DFA8; border-radius:8px; padding:5px 9px;
    font-weight:600; white-space:normal; word-break:break-word}

  .actions{display:flex; gap:8px; flex:0 0 auto}
  .btn-note,.btn-done{
    background:#fff; border:1px solid var(--line); color:var(--ink); font-weight:700;
    font-size:14px; padding:11px 14px; border-radius:11px;
  }
  .btn-note:active,.btn-done:active{background:#F2F0EC}

  .empty{text-align:center; color:var(--muted); padding:54px 16px}
  .empty .big{font-size:17px; font-weight:700; color:var(--ink); margin-bottom:4px}

  .modal{position:fixed; inset:0; background:rgba(28,34,48,.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:20}
  .modal .box{background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:20px; width:100%; max-width:420px}
  .modal h2{margin:0 0 12px; font-size:18px}
  .modal textarea{width:100%; min-height:96px; font-family:inherit; font-size:16px; padding:12px; border:1px solid var(--line); border-radius:11px; background:#FBFAF8; color:var(--ink); resize:vertical}
  .modal textarea:focus{outline:2px solid var(--ink); outline-offset:1px; border-color:transparent}
  .modal-acts{display:flex; gap:10px; margin-top:14px}
  .modal-acts button{flex:1; font-weight:700; font-size:15px; padding:12px; border-radius:11px}
  #noteCancel{background:#fff; border:1px solid var(--line); color:var(--ink)}
  #noteSave{background:var(--ink); color:#fff}

  .hidden{display:none !important}
  @media (max-width:560px){
    form.add{grid-template-columns:1fr 1fr}
    .add .field-name{grid-column:1 / -1}
    .plate{min-width:64px; height:64px}
    .plate .num{font-size:24px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Curbside <span>Arrivals</span></h1>
    <div class="counts">
      <span class="pill w" id="cWait">0 for fulfillment</span>
      <span class="pill r" id="cReady">0 for runner</span>
    </div>
  </header>

  <form class="add" id="addForm" autocomplete="off">
    <div class="field-name">
      <label for="name">Customer name</label>
      <input id="name" placeholder="e.g. Jordan Lee" maxlength="80" required>
    </div>
    <div class="field-spot">
      <label for="spot">Spot #</label>
      <input id="spot" placeholder="—" maxlength="20" inputmode="numeric">
    </div>
    <div class="field-notes">
      <label for="notes">Important note (optional)</label>
      <input id="notes" placeholder="e.g. needs help loading, order #1234, blue van" maxlength="300">
    </div>
    <button type="submit">Add arrival</button>
  </form>

  <div class="list" id="list"></div>
  <div class="empty" id="empty">
    <div class="big">No active arrivals right now</div>
    <div>Add an arrival above and it'll appear here.</div>
  </div>
</div>

<div class="modal hidden" id="noteModal">
  <div class="box">
    <h2>Important note</h2>
    <textarea id="noteText" maxlength="300" placeholder="e.g. needs help loading, order #1234, blue van"></textarea>
    <div class="modal-acts">
      <button id="noteCancel" type="button">Cancel</button>
      <button id="noteSave" type="button">Save note</button>
    </div>
  </div>
</div>

<script>
  const STORE = "curbside_arrivals_v1";
  let arrivals = load();
  let editingNoteId = null;

  function load(){ try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch(e){ return []; } }
  function save(){ try { localStorage.setItem(STORE, JSON.stringify(arrivals)); } catch(e){} }

  const $ = (id) => document.getElementById(id);

  function fmtElapsed(ms){
    const s = Math.max(0, Math.floor(ms/1000));
    if (s < 60) return "just now";
    const m = Math.floor(s/60);
    if (m < 60) return m + " min";
    const h = Math.floor(m/60), r = m % 60;
    return h + "h" + (r ? " " + r + "m" : "");
  }
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function render(){
    const now = Date.now();
    arrivals.sort((a,b) => (a.ready - b.ready) || (a.created - b.created));
    const waiting = arrivals.filter(a => !a.ready).length;
    $("cWait").textContent = waiting + " for fulfillment";
    $("cReady").textContent = (arrivals.length - waiting) + " for runner";

    if (arrivals.length === 0){ $("list").innerHTML = ""; $("empty").style.display = ""; return; }
    $("empty").style.display = "none";

    $("list").innerHTML = arrivals.map(a => {
      const cls = a.ready ? "ready" : "waiting";
      const spot = a.spot ? esc(a.spot) : "—";
      const tag = a.ready ? "Runner" : "Fulfill";
      const waited = fmtElapsed(now - a.created);
      const meta = a.ready ? "Ready for runner" : "Waiting for fulfillment \u00b7 <b>" + waited + "</b>";
      const note = a.notes || "";
      const noteHtml = note ? `<div class="note">\uD83D\uDCCC ${esc(note)}</div>` : "";
      return `
        <div class="card ${cls}" data-id="${a.id}">
          <button class="plate" data-act="ready" aria-label="Toggle status for spot ${spot}">
            <span class="num">${spot}</span><span class="tag">${tag}</span>
          </button>
          <div class="who">
            <div class="name">${esc(a.name)}</div>
            <div class="meta">${meta}</div>
            ${noteHtml}
          </div>
          <div class="actions">
            <button class="btn-note" data-act="note">${note ? "Edit note" : "Note"}</button>
            <button class="btn-done" data-act="done">Picked up</button>
          </div>
        </div>`;
    }).join("");
  }

  $("list").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const id = Number(btn.closest(".card").dataset.id);
    const a = arrivals.find(x => x.id === id);
    if (!a) return;
    const act = btn.dataset.act;
    if (act === "ready"){ a.ready = !a.ready; save(); render(); }
    else if (act === "done"){ arrivals = arrivals.filter(x => x.id !== id); save(); render(); }
    else if (act === "note"){ openNote(id, a.notes || ""); }
  });

  $("addForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const name = $("name").value.trim();
    const spot = $("spot").value.trim();
    const notes = $("notes").value.trim();
    if (!name) { $("name").focus(); return; }
    arrivals.push({ id: Date.now(), name, spot, ready: false, notes, created: Date.now() });
    $("name").value = ""; $("spot").value = ""; $("notes").value = "";
    $("name").focus();
    save(); render();
  });

  // Note editor (modal so it isn't disturbed by the periodic elapsed-time refresh)
  function openNote(id, current){ editingNoteId = id; $("noteText").value = current || ""; $("noteModal").classList.remove("hidden"); $("noteText").focus(); }
  function closeNote(){ $("noteModal").classList.add("hidden"); editingNoteId = null; }
  $("noteCancel").addEventListener("click", closeNote);
  $("noteSave").addEventListener("click", () => {
    if (editingNoteId == null) return;
    const a = arrivals.find(x => x.id === editingNoteId);
    if (a){ a.notes = $("noteText").value.trim(); save(); }
    closeNote(); render();
  });

  render();
  $("name").focus();
  setInterval(render, 15000);   // keep the "waiting X min" labels fresh
</script>
</body>
</html>
